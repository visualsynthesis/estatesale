<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATL Estate Sales Finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3346;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-hover: #8aa4ff;
    --accent-bg: rgba(108,140,255,0.1);
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --yellow: #facc15;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 span.icon { font-size: 1.6rem; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .updated-text {
    color: var(--text-dim);
    font-size: 0.8rem;
  }
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--border); }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-accent:hover { background: var(--accent-hover); }

  /* ── Search & Filters Bar ── */
  .controls {
    padding: 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--text); }
  .filter-chip.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── View Toggle + Day Tabs ── */
  .tabs-bar {
    display: flex;
    align-items: center;
    padding: 12px 24px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    background: var(--bg);
  }
  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .view-toggle button {
    padding: 8px 14px;
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--accent);
    color: #fff;
  }
  .day-tab {
    padding: 8px 18px;
    border-radius: var(--radius);
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.85rem;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .day-tab:hover { color: var(--text); border-color: var(--border); }
  .day-tab.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .day-tab .count {
    display: inline-block;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 0.7rem;
    margin-left: 4px;
  }
  .day-tab.active .count {
    background: var(--accent);
    color: #fff;
  }

  /* ── Main Content ── */
  .main {
    display: flex;
    height: calc(100vh - 200px);
    min-height: 500px;
  }

  /* ── Card List ── */
  .card-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card-list::-webkit-scrollbar { width: 6px; }
  .card-list::-webkit-scrollbar-track { background: transparent; }
  .card-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .sale-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sale-card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .sale-card.highlighted {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .card-title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }
  .source-badge {
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .source-badge.estatesales-net { background: #2563eb22; color: #60a5fa; border: 1px solid #2563eb44; }
  .source-badge.estatesales-org { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
  .source-badge.estatesale-com { background: #9333ea22; color: #c084fc; border: 1px solid #9333ea44; }
  .source-badge.gsalr { background: #ea580c22; color: #fb923c; border: 1px solid #ea580c44; }
  .source-badge.craigslist { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
  .card-company {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 8px;
  }
  .card-address {
    font-size: 0.85rem;
    margin-bottom: 6px;
  }
  .card-address strong { color: var(--text); }
  .card-dates {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .date-pill {
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .date-pill.today { background: #16a34a22; border-color: #16a34a66; color: var(--green); }
  .date-pill.tomorrow { background: #2563eb22; border-color: #2563eb66; color: #60a5fa; }
  .card-categories {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }
  .cat-tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
  }
  .card-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-photos {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .card-link {
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
  }
  .card-link:hover { text-decoration: underline; }

  /* ── Map Panel ── */
  .map-panel {
    width: 50%;
    min-width: 300px;
    border-left: 1px solid var(--border);
    position: relative;
  }
  #map {
    width: 100%;
    height: 100%;
  }
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important;
    box-shadow: var(--shadow) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { font-size: 0.85rem; line-height: 1.4; }
  .leaflet-popup-content a { color: var(--accent); }

  /* ── No Results ── */
  .no-results {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }
  .no-results h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }

  /* ── Source filter dropdown ── */
  .source-filter {
    position: relative;
  }
  .source-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    z-index: 100;
    min-width: 180px;
    box-shadow: var(--shadow);
  }
  .source-dropdown.open { display: block; }
  .source-dropdown label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 0.82rem;
    border-radius: 6px;
  }
  .source-dropdown label:hover { background: var(--surface2); }

  /* ── Full map view ── */
  .main.map-only .card-list { display: none; }
  .main.map-only .map-panel { width: 100%; border-left: none; }
  .main.list-only .map-panel { display: none; }
  .main.list-only .card-list { max-width: 900px; margin: 0 auto; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 1.1rem; }
    .controls { padding: 12px 16px; }
    .tabs-bar { padding: 10px 16px; }
    .card-list { padding: 12px 16px; }
    .main { flex-direction: column; height: auto; min-height: auto; }
    .map-panel { width: 100%; height: 350px; border-left: none; border-top: 1px solid var(--border); }
    .main.list-only .map-panel { display: none; }
    .main.map-only .card-list { display: none; }
    .main.map-only .map-panel { height: calc(100vh - 200px); }
  }

  /* ── Print Styles ── */
  @media print {
    body { background: #fff; color: #000; font-size: 11pt; }
    .header, .controls, .tabs-bar, .map-panel, .btn, .card-link, .card-photos, .source-filter { display: none !important; }
    .main { display: block !important; height: auto !important; }
    .card-list { padding: 0; overflow: visible; }
    .sale-card {
      background: #fff;
      border: 1px solid #ccc;
      break-inside: avoid;
      page-break-inside: avoid;
      padding: 10px;
      margin-bottom: 8px;
      box-shadow: none;
    }
    .sale-card:hover { transform: none; box-shadow: none; }
    .source-badge { border: 1px solid #999; background: #eee; color: #333; }
    .cat-tag { border: 1px solid #ccc; background: #f5f5f5; color: #333; }
    .date-pill { border: 1px solid #ccc; background: #f5f5f5; color: #000; }
    .card-desc { -webkit-line-clamp: unset; }
    .print-header {
      display: block !important;
      text-align: center;
      padding: 16px 0;
      border-bottom: 2px solid #000;
      margin-bottom: 16px;
    }
    .print-header h1 { font-size: 18pt; }
    .print-header p { font-size: 10pt; color: #666; }
  }
  .print-header { display: none; }
</style>
</head>
<body>

<div class="print-header">
  <h1>ATL Estate Sales Finder</h1>
  <p id="print-subtitle"></p>
</div>

<header class="header">
  <h1><span class="icon">&#x1f3e0;</span> ATL Estate Sales</h1>
  <div class="header-right">
    <span class="updated-text" id="lastUpdated"></span>
    <button class="btn" onclick="window.print()">&#x1f5a8; Print</button>
  </div>
</header>

<div class="controls">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search sales, items, locations..." />
  </div>
  <div class="filter-group" id="categoryFilters"></div>
  <div class="source-filter">
    <button class="btn" id="sourceBtn">Sources &#x25BE;</button>
    <div class="source-dropdown" id="sourceDropdown"></div>
  </div>
</div>

<div class="tabs-bar">
  <div class="view-toggle">
    <button id="viewBoth" class="active" onclick="setView('both')">Split</button>
    <button id="viewList" onclick="setView('list-only')">List</button>
    <button id="viewMap" onclick="setView('map-only')">Map</button>
  </div>
  <div id="dayTabs" style="display:flex;gap:6px;overflow-x:auto;"></div>
</div>

<div class="main" id="mainContent">
  <div class="card-list" id="cardList"></div>
  <div class="map-panel">
    <div id="map"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function() {
  'use strict';

  // ── State ──
  let allSales = [];
  let filteredSales = [];
  let activeDay = 'all';
  let activeCategories = new Set();
  let activeSources = new Set();
  let searchQuery = '';
  let currentView = 'both';
  let map, markers = [];

  const CATEGORIES = ['furniture','antiques','jewelry','tools','art','collectibles','electronics','kitchenware','clothing','books','outdoor','sports','toys'];
  const SOURCE_LABELS = {
    'estatesales.net': 'EstateSales.NET',
    'estatesales.org': 'EstateSales.org',
    'estatesale.com': 'EstateSale.com',
    'gsalr.com': 'gsalr.com',
    'craigslist': 'Craigslist'
  };
  const SOURCE_CLASSES = {
    'estatesales.net': 'estatesales-net',
    'estatesales.org': 'estatesales-org',
    'estatesale.com': 'estatesale-com',
    'gsalr.com': 'gsalr',
    'craigslist': 'craigslist'
  };
  const DAY_COLORS = {
    'Thursday': '#facc15',
    'Friday': '#fb923c',
    'Saturday': '#6c8cff',
    'Sunday': '#4ade80'
  };

  // ── Init ──
  async function init() {
    try {
      const resp = await fetch('data/sales.json');
      const data = await resp.json();
      allSales = data.sales || [];
      document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date(data.last_updated).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    } catch(e) {
      allSales = [];
      document.getElementById('lastUpdated').textContent = 'Could not load data';
    }

    // Enable all sources by default
    const sources = [...new Set(allSales.map(s => s.source))];
    sources.forEach(s => activeSources.add(s));

    initMap();
    buildCategoryFilters();
    buildSourceDropdown();
    buildDayTabs();
    applyFilters();

    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      applyFilters();
    });
  }

  // ── Map ──
  function initMap() {
    map = L.map('map', { zoomControl: true }).setView([33.88, -84.38], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(map);
  }

  function updateMapMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    filteredSales.forEach(sale => {
      if (!sale.lat || !sale.lng) return;
      const days = sale.dates.map(d => d.day);
      const color = DAY_COLORS[days[0]] || '#6c8cff';

      const icon = L.divIcon({
        className: '',
        html: `<div style="width:14px;height:14px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });

      const marker = L.marker([sale.lat, sale.lng], { icon }).addTo(map);
      const popupHtml = `
        <div style="max-width:240px">
          <strong>${esc(sale.title)}</strong><br>
          <span style="color:#888">${esc(sale.company)}</span><br>
          <strong>${esc(sale.address)}</strong><br>
          ${esc(sale.city)}, ${esc(sale.zip)}<br>
          <div style="margin-top:6px">${sale.dates.map(d => `${d.day} ${d.start}–${d.end}`).join('<br>')}</div>
          <a href="${esc(sale.url)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:6px">View listing &rarr;</a>
        </div>`;
      marker.bindPopup(popupHtml);

      marker.on('click', () => {
        document.querySelectorAll('.sale-card').forEach(c => c.classList.remove('highlighted'));
        const card = document.getElementById('card-' + sale.id);
        if (card) {
          card.classList.add('highlighted');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });

      markers.push(marker);
    });

    if (markers.length > 0) {
      const group = new L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.1));
    }
  }

  // ── Build UI ──
  function buildCategoryFilters() {
    const container = document.getElementById('categoryFilters');
    CATEGORIES.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'filter-chip';
      chip.textContent = cat;
      chip.onclick = () => {
        if (activeCategories.has(cat)) {
          activeCategories.delete(cat);
          chip.classList.remove('active');
        } else {
          activeCategories.add(cat);
          chip.classList.add('active');
        }
        applyFilters();
      };
      container.appendChild(chip);
    });
  }

  function buildSourceDropdown() {
    const dropdown = document.getElementById('sourceDropdown');
    const sources = [...new Set(allSales.map(s => s.source))];

    sources.forEach(src => {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.onchange = () => {
        if (cb.checked) activeSources.add(src);
        else activeSources.delete(src);
        applyFilters();
      };
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + (SOURCE_LABELS[src] || src)));
      dropdown.appendChild(label);
    });

    document.getElementById('sourceBtn').onclick = (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    };
    document.addEventListener('click', () => dropdown.classList.remove('open'));
    dropdown.addEventListener('click', (e) => e.stopPropagation());
  }

  function buildDayTabs() {
    const container = document.getElementById('dayTabs');
    // Gather all unique days from the data
    const dayOrder = ['Thursday', 'Friday', 'Saturday', 'Sunday', 'Monday', 'Tuesday', 'Wednesday'];
    const allDays = new Set();
    allSales.forEach(s => s.dates.forEach(d => allDays.add(d.day)));
    const orderedDays = dayOrder.filter(d => allDays.has(d));

    // All tab
    const allTab = createDayTab('All', 'all', allSales.length);
    container.appendChild(allTab);

    orderedDays.forEach(day => {
      const count = allSales.filter(s => s.dates.some(d => d.day === day)).length;
      container.appendChild(createDayTab(day, day, count));
    });

    // Activate "All"
    container.querySelector('.day-tab').classList.add('active');
  }

  function createDayTab(label, value, count) {
    const tab = document.createElement('button');
    tab.className = 'day-tab';
    tab.innerHTML = `${label} <span class="count">${count}</span>`;
    tab.onclick = () => {
      document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeDay = value;
      applyFilters();
    };
    return tab;
  }

  // ── Filtering ──
  function applyFilters() {
    filteredSales = allSales.filter(sale => {
      // Day filter
      if (activeDay !== 'all' && !sale.dates.some(d => d.day === activeDay)) return false;
      // Source filter
      if (!activeSources.has(sale.source)) return false;
      // Category filter (must have ALL selected categories)
      if (activeCategories.size > 0) {
        for (const cat of activeCategories) {
          if (!sale.categories.includes(cat)) return false;
        }
      }
      // Search
      if (searchQuery) {
        const haystack = [sale.title, sale.company, sale.address, sale.city, sale.zip, sale.description].join(' ').toLowerCase();
        if (!haystack.includes(searchQuery)) return false;
      }
      return true;
    });

    // Sort: by first date's day order, then by start time
    const dayOrder = { 'Thursday': 0, 'Friday': 1, 'Saturday': 2, 'Sunday': 3, 'Monday': 4 };
    filteredSales.sort((a, b) => {
      const aDay = dayOrder[a.dates[0]?.day] ?? 9;
      const bDay = dayOrder[b.dates[0]?.day] ?? 9;
      if (aDay !== bDay) return aDay - bDay;
      return (a.dates[0]?.start || '').localeCompare(b.dates[0]?.start || '');
    });

    renderCards();
    updateMapMarkers();
    updatePrintSubtitle();
  }

  // ── Render Cards ──
  function renderCards() {
    const container = document.getElementById('cardList');

    if (filteredSales.length === 0) {
      container.innerHTML = `<div class="no-results"><h3>No sales found</h3><p>Try adjusting your filters or search terms</p></div>`;
      return;
    }

    let currentDay = '';
    let html = '';

    filteredSales.forEach(sale => {
      const firstDay = sale.dates[0]?.day || '';
      if (activeDay === 'all' && firstDay !== currentDay) {
        currentDay = firstDay;
        html += `<div style="font-weight:700;font-size:0.9rem;color:${DAY_COLORS[currentDay] || 'var(--text)'};padding:8px 0 4px;border-bottom:1px solid var(--border);margin-top:8px;">${currentDay}</div>`;
      }

      const sourceClass = SOURCE_CLASSES[sale.source] || '';
      const sourceLabel = SOURCE_LABELS[sale.source] || sale.source;

      html += `
        <div class="sale-card" id="card-${sale.id}" onclick="cardClick('${sale.id}')">
          <div class="card-top">
            <div class="card-title">${esc(sale.title)}</div>
            <span class="source-badge ${sourceClass}">${esc(sourceLabel)}</span>
          </div>
          ${sale.company ? `<div class="card-company">${esc(sale.company)}</div>` : ''}
          <div class="card-address"><strong>${esc(sale.address)}</strong> &middot; ${esc(sale.city)}, ${esc(sale.zip)}</div>
          <div class="card-dates">
            ${sale.dates.map(d => {
              let cls = '';
              const today = new Date().toISOString().slice(0,10);
              const tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0,10);
              if (d.date === today) cls = 'today';
              else if (d.date === tomorrow) cls = 'tomorrow';
              return `<span class="date-pill ${cls}">${d.day} ${d.start}–${d.end}</span>`;
            }).join('')}
          </div>
          <div class="card-categories">${sale.categories.map(c => `<span class="cat-tag">${c}</span>`).join('')}</div>
          <div class="card-desc">${esc(sale.description)}</div>
          <div class="card-footer">
            <span class="card-photos">${sale.photos ? sale.photos + ' photos' : ''}</span>
            <a class="card-link" href="${esc(sale.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View listing &rarr;</a>
          </div>
        </div>`;
    });

    container.innerHTML = html;
  }

  // ── View Toggle ──
  window.setView = function(view) {
    currentView = view;
    const main = document.getElementById('mainContent');
    main.className = 'main ' + (view === 'both' ? '' : view);
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    if (view === 'both') document.getElementById('viewBoth').classList.add('active');
    else if (view === 'list-only') document.getElementById('viewList').classList.add('active');
    else document.getElementById('viewMap').classList.add('active');
    setTimeout(() => map.invalidateSize(), 100);
  };

  // ── Card Click → Map ──
  window.cardClick = function(id) {
    const sale = filteredSales.find(s => s.id === id);
    if (!sale || !sale.lat || !sale.lng) return;
    map.setView([sale.lat, sale.lng], 14);
    const marker = markers.find(m => {
      const ll = m.getLatLng();
      return Math.abs(ll.lat - sale.lat) < 0.0001 && Math.abs(ll.lng - sale.lng) < 0.0001;
    });
    if (marker) marker.openPopup();
  };

  // ── Print ──
  function updatePrintSubtitle() {
    const dayText = activeDay === 'all' ? 'All Days' : activeDay;
    const count = filteredSales.length;
    document.getElementById('print-subtitle').textContent = `${dayText} \u2022 ${count} sale${count !== 1 ? 's' : ''} \u2022 Greater Atlanta \u2022 Printed ${new Date().toLocaleDateString()}`;
  }

  // ── Utils ──
  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Go ──
  init();
})();
</script>
</body>
</html>
